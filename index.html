<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TURBO FUELITE | Live Stats</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0d0f14; color: #e2e8f0; }
        .tab-btn.active { background-color: #f59e0b; color: #000; font-weight: bold; }
    </style>
</head>
<body class="font-sans antialiased">

    <!-- Header -->
    <header class="bg-[#161920] border-b border-gray-800 p-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-amber-500 tracking-wider">TURBO FUELITE</h1>
            <span class="text-xs bg-amber-500/20 text-amber-500 px-3 py-1 rounded-full font-bold uppercase tracking-widest">Live Admin Connected</span>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="max-w-6xl mx-auto px-4 py-8 text-center">
        <h2 class="text-3xl md:text-5xl font-extrabold text-white mb-2">LOBBY MATCH <span class="text-amber-500">STATS</span></h2>
        <p class="text-gray-400 text-xs md:text-sm">Lobby select karke har ek match ke player kills dekhein.</p>
    </section>

    <!-- Lobby Selector Buttons -->
    <section class="max-w-6xl mx-auto px-4 mb-6">
        <div id="lobby-buttons" class="flex justify-center space-x-3 bg-[#161920] p-2 rounded-xl border border-gray-800">
            <p class="text-xs text-gray-500 p-2">Lobbies loading...</p>
        </div>
    </section>

    <!-- Matches Display Area -->
    <main id="matches-container" class="max-w-6xl mx-auto px-4 space-y-6 mb-16">
        <!-- Matches data automatic yahan aayega -->
    </main>

    <!-- Footer -->
    <footer class="text-center py-6 border-t border-gray-800 text-xs text-gray-500">
        &copy; 2026 TURBO FUELITE. All Rights Reserved.
    </footer>

    <script>
        // Aapki Real Sheet ID maine yahan add kar di hai
        const SHEET_ID = '14ulllMnFHmcSeMhGlEkLIRXidDd_nRY6NAxUavXzybw'; 
        const SHEET_TITLE = 'Sheet1'; 
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_TITLE}`;

        let allData = [];

        // Fetch Data from Google Sheet
        async function loadStats() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                const jsonData = JSON.parse(text.substr(47).slice(0, -2));
                const rows = jsonData.table.rows;
                
                allData = rows.map(row => ({
                    lobby: row.c[0]?.v || '',
                    match: row.c[1]?.v || '',
                    p1_kills: row.c[2]?.v || 0, // Mogambo_kills
                    p2_kills: row.c[3]?.v || 0, // Raunak_kills
                    p3_kills: row.c[4]?.v || 0, // Aarus_kills
                    p4_kills: row.c[5]?.v || 0, // Piyush_kills
                }));

                createLobbyButtons();
            } catch (error) {
                console.error("Error loading data:", error);
                document.getElementById('matches-container').innerHTML = `<p class="text-red-500 text-center text-sm">Data load karne me error aaya. GitHub page ko ek baar hard-refresh karein.</p>`;
            }
        }

        // Generate Buttons
        function createLobbyButtons() {
            const lobbies = [...new Set(allData.map(item => item.lobby))].filter(l => l !== '');
            const btnContainer = document.getElementById('lobby-buttons');
            btnContainer.innerHTML = '';

            if(lobbies.length === 0) {
                btnContainer.innerHTML = '<p class="text-xs text-gray-500 p-2">No active lobbies found in sheet.</p>';
                return;
            }

            lobbies.forEach((lobby, index) => {
                const btn = document.createElement('button');
                btn.innerText = `🕒 ${lobby}`;
                btn.className = `tab-btn w-full py-3 rounded-lg text-sm font-semibold transition duration-200 text-gray-400 hover:text-white`;
                btn.id = `btn-${lobby.replace(/\s+/g, '')}`;
                btn.onclick = () => showLobbyMatches(lobby);
                btnContainer.appendChild(btn);

                if(index === 0) {
                    btn.classList.add('active');
                    btn.classList.remove('text-gray-400');
                    showLobbyMatches(lobby);
                }
            });
        }

        // Show Matches
        function showLobbyMatches(lobbyName) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                btn.classList.add('text-gray-400');
            });
            
            const btnId = `btn-${lobbyName.replace(/\s+/g, '')}`;
            const targetBtn = document.getElementById(btnId);
            if(targetBtn) targetBtn.classList.add('active');

            const container = document.getElementById('matches-container');
            container.innerHTML = '';

            const filteredMatches = allData.filter(item => item.lobby === lobbyName);

            filteredMatches.forEach(match => {
                const matchBlock = `
                    <div class="bg-[#161920] border border-gray-800 rounded-xl overflow-hidden shadow-lg">
                        <div class="bg-gradient-to-r from-amber-600 to-amber-500 p-4">
                            <h3 class="font-black text-black tracking-wide text-sm md:text-lg uppercase">${match.match}</h3>
                        </div>
                        <div class="p-4 grid grid-cols-2 md:grid-cols-4 gap-4">
                            <!-- Mogambo -->
                            <div class="bg-[#0d0f14] p-3 rounded-lg border border-gray-800 text-center">
                                <p class="text-sm font-bold text-white truncate">MOGAMBO</p>
                                <p class="text-xs text-amber-500 font-medium tracking-wider uppercase mb-1">IGL</p>
                                <p class="text-2xl font-black text-white mt-1">${match.p1_kills} <span class="text-xs font-normal text-gray-400">Kills</span></p>
                            </div>
                            <!-- Raunak -->
                            <div class="bg-[#0d0f14] p-3 rounded-lg border border-gray-800 text-center">
                                <p class="text-sm font-bold text-white truncate">RAUNAK</p>
                                <p class="text-xs text-amber-500 font-medium tracking-wider uppercase mb-1">Rusher</p>
                                <p class="text-2xl font-black text-white mt-1">${match.p2_kills} <span class="text-xs font-normal text-gray-400">Kills</span></p>
                            </div>
                            <!-- Aarus -->
                            <div class="bg-[#0d0f14] p-3 rounded-lg border border-gray-800 text-center">
                                <p class="text-sm font-bold text-white truncate">AARUS</p>
                                <p class="text-xs text-amber-500 font-medium tracking-wider uppercase mb-1">2nd Rusher</p>
                                <p class="text-2xl font-black text-white mt-1">${match.p3_kills} <span class="text-xs font-normal text-gray-400">Kills</span></p>
                            </div>
                            <!-- Piyush -->
                            <div class="bg-[#0d0f14] p-3 rounded-lg border border-gray-800 text-center">
                                <p class="text-sm font-bold text-white truncate">PIYUSH</p>
                                <p class="text-xs text-amber-500 font-medium tracking-wider uppercase mb-1">Sniper</p>
                                <p class="text-2xl font-black text-white mt-1">${match.p4_kills} <span class="text-xs font-normal text-gray-400">Kills</span></p>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += matchBlock;
            });
        }

        loadStats();
    </script>
</body>
</html>
